<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата успешна — Preep Docs</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .success-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
        }
        
        .success-card {
            background: white;
            border-radius: 32px;
            padding: 60px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        .success-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }
        
        .success-card h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--gray-900);
        }
        
        .bonus-message {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
            padding: 20px;
            border-radius: var(--radius-lg);
            margin: 25px 0;
            font-weight: 600;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <meta http-equiv="refresh" content="5;url=/" />
</head>
<body>
    <div class="success-page">
        <div class="success-card">
            <div class="success-icon">✅</div>
            <h1>Оплата прошла успешно!</h1>
            <p>Документы отправлены на вашу почту</p>
            
            <div class="bonus-message" id="bonusMessage">
                🎁 Бонусные генерации начислены!
            </div>
            
            <div class="loader"></div>
            <p style="color: var(--gray-400);">Через 5 секунд вы будете перенаправлены...</p>
            
            <a href="/" class="btn btn-primary" style="margin-top: 20px;">Вернуться на главную</a>
        </div>
    </div>
    
    <script>
        // Отмечаем успешный платеж
        localStorage.setItem('last_payment_success', 'true');
        
        // Если это PRO-тариф
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('pro')) {
            document.getElementById('bonusMessage').innerHTML = 
                '🎉 PRO-тариф активирован! Вам доступны скидки и удвоенные бонусы.';
        }
    </script>
</body>
</html>
